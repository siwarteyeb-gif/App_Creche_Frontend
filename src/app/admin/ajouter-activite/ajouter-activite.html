<div class="ajouter-activite-wrapper">
  <header class="ajouter-activite-header">
    <div class="header-content">
      <div class="header-left">
        <button class="btn btn-back" routerLink="/admin/bebes">
        Retour à la liste des bébés
        </button>
      </div>
      <h2 class="header-title">Ajouter une activité pour bébé ID: {{ bebeId }}</h2>
      <div class="header-actions">
        <button class="btn btn-logout" (click)="logout()">
          Logout
        </button>
      </div>
    </div>
  </header>

  <div class="ajouter-activite-container">
    <div class="form-container">
      <form>
        <div class="form-group">
          <label>
            Type:
            <input type="text" [(ngModel)]="typeActivite" name="typeActivite" />
          </label>
        </div>

        <div class="form-group">
          <label>
            Notes:
            <input type="text" [(ngModel)]="notes" name="notes" />
          </label>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-submit" (click)="ajouter()">
            Ajouter activité
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
